name: Build MochiV2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        working-directory: 02-application
        run: dotnet restore MochiV2.sln

      - name: Build
        working-directory: 02-application
        run: dotnet build MochiV2.sln --configuration Release --no-restore

      - name: Test
        working-directory: 02-application
        run: dotnet test tests-core --configuration Release --no-build
        continue-on-error: true

      - name: Publish self-contained single-file exe
        working-directory: 02-application/App
        run: dotnet publish MochiV2.csproj --configuration Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../../publish

      - name: Bundle assets into publish folder
        shell: pwsh
        run: |
          Copy-Item -Path 02-application/Assets/Sprite_optimized -Destination publish/Assets/Sprite_optimized -Recurse -Force
          Copy-Item -Path 02-application/Assets/Sound -Destination publish/Assets/Sound -Recurse -Force
          Copy-Item -Path 02-application/Assets/manifest.json -Destination publish/Assets/manifest.json -Force
          Write-Host "Bundle size: $((Get-ChildItem publish -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)MB"

      - name: Zip bundle
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath MochiV2-win-x64-bundle.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MochiV2-win-x64-bundle
          path: MochiV2-win-x64-bundle.zip
          retention-days: 30