<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-3: Tray Icon Context Menu</title>
<style>
  body { margin: 0; background: #2a2a2e; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .tray-area { position: relative; width: 400px; height: 300px; }
  .tray-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 32px; background: #0d0d1a; border: 1px solid #333; display: flex; align-items: center; justify-content: flex-end; padding: 0 12px; gap: 8px; }
  .tray-icon { width: 20px; height: 20px; background: #E8A0BF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .tray-tooltip { position: absolute; bottom: 38px; right: 12px; background: #1a1a2e; color: #E8A0BF; padding: 4px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; border: 1px solid #333; }

  .menu { position: absolute; bottom: 40px; right: 12px; width: 200px; background: #FFF8F0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); padding: 4px 0; border: 1px solid #e0d0c8; }
  .menu-item { padding: 8px 16px; font-size: 13px; color: #5D4037; display: flex; align-items: center; gap: 8px; cursor: pointer; border-radius: 0; }
  .menu-item:hover { background: #E8A0BF22; }
  .menu-item .icon { width: 18px; text-align: center; }
  .menu-item .shortcut { margin-left: auto; font-size: 11px; color: #8D6E63; }
  .menu-sep { height: 1px; background: #e0d0c8; margin: 4px 12px; }
  .menu-item.danger { color: #EF5350; }
  .menu-title { padding: 6px 16px; font-size: 10px; text-transform: uppercase; color: #8D6E63; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="tray-area">
  <div class="tray-tooltip">Mochi is here 💚</div>

  <div class="menu">
    <div class="menu-title">Mochi Menu</div>
    <div class="menu-item"><span class="icon">🍽️</span> Feed Mochi</div>
    <div class="menu-item"><span class="icon">🎉</span> Play with Mochi</div>
    <div class="menu-item"><span class="icon">😴</span> Sleep / Wake up</div>
    <div class="menu-item"><span class="icon">📊</span> Stats...</div>
    <div class="menu-sep"></div>
    <div class="menu-item"><span class="icon">⚙️</span> Settings...</div>
    <div class="menu-item"><span class="icon">📍</span> Bring Mochi here</div>
    <div class="menu-sep"></div>
    <div class="menu-item danger"><span class="icon">❌</span> Exit</div>
  </div>

  <div class="tray-bar">
    <div style="color: #666; font-size: 10px; margin-right: auto;">System Tray</div>
    <div style="color: #666; font-size: 12px;">🔊</div>
    <div style="color: #666; font-size: 12px;">📶</div>
    <div class="tray-icon">🐾</div>
  </div>
</div>
</body>
</html>
