<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-4: Stats Popup</title>
<style>
  body { margin: 0; background: #2a2a2e; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .scene { position: relative; width: 400px; height: 300px; }
  .cat { position: absolute; bottom: 30px; left: 160px; font-size: 48px; }

  .popup { position: absolute; bottom: 100px; left: 220px; width: 180px; background: #FFF8F0; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); padding: 12px 14px; border: 1px solid #e0d0c8; }
  .popup-title { font-size: 11px; text-transform: uppercase; color: #8D6E63; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
  .stat-row { margin-bottom: 8px; }
  .stat-label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #5D4037; margin-bottom: 3px; }
  .stat-bar { width: 100%; height: 6px; background: #f0e8e0; border-radius: 999px; overflow: hidden; }
  .stat-fill { height: 100%; border-radius: 999px; }
  .level-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0e8e0; font-size: 12px; color: #5D4037; }
  .level-badge { background: #E8A0BF; color: #fff; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .xp-text { font-size: 10px; color: #8D6E63; }
  .auto-dismiss { position: absolute; top: 6px; right: 8px; font-size: 9px; color: #bbb; }
</style>
</head>
<body>
<div class="scene">
  <div class="cat">🐱</div>

  <div class="popup">
    <div class="popup-title">📊 Mochi Stats</div>
    <span class="auto-dismiss">5s</span>

    <div class="stat-row">
      <div class="stat-label">🍽️ Food <span style="margin-left: auto; color: #8D6E63;">70/100</span></div>
      <div class="stat-bar"><div class="stat-fill" style="width: 70%; background: #FFB74D;"></div></div>
    </div>

    <div class="stat-row">
      <div class="stat-label">⚡ Energy <span style="margin-left: auto; color: #8D6E63;">80/100</span></div>
      <div class="stat-bar"><div class="stat-fill" style="width: 80%; background: #81C784;"></div></div>
    </div>

    <div class="stat-row">
      <div class="stat-label">💚 Happiness <span style="margin-left: auto; color: #8D6E63;">65/100</span></div>
      <div class="stat-bar"><div class="stat-fill" style="width: 65%; background: #E8A0BF;"></div></div>
    </div>

    <div class="level-row">
      <span class="level-badge">Level 3</span>
      <span class="xp-text">XP: 120/500</span>
    </div>
  </div>
</div>
</body>
</html>
